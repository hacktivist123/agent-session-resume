name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate package
        run: python3 scripts/validate-skill-package.py

      - name: Validate fixtures
        run: python3 scripts/validate-fixtures.py

      - name: Validate trigger matrix
        run: python3 scripts/validate-trigger-matrix.py

      - name: Validate session event projection
        run: python3 scripts/validate-session-events.py

      - name: Validate session digest caching
        run: python3 scripts/validate-session-digest.py

      - name: Validate session candidate filters
        run: python3 scripts/validate-session-candidates.py

      - name: Compile validator scripts
        run: python3 -m py_compile scripts/validate-skill-package.py scripts/validate-fixtures.py scripts/validate-trigger-matrix.py scripts/validate-session-events.py scripts/validate-session-digest.py scripts/validate-session-candidates.py scripts/validate-handoff.py

      - name: Compile packaged runtime scripts
        run: python3 -m py_compile skills/agent-session-resume/scripts/session-events.py skills/agent-session-resume/scripts/session-candidates.py skills/agent-session-resume/scripts/session-digest.py skills/agent-session-resume/scripts/skill-provenance.py
